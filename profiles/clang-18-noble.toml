# Clang 18 on Noble with workarounds for known toolchain issues.

[compiler]
type = "clang"
version = "18"

[target]
series = "noble"

[[flags]]
var = "DEB_CFLAGS_APPEND"
flag = "-gdwarf-4"
reason = "Noble's dwz 0.15 doesn't support DWARF5 (Clang 18 defaults to DWARF5)"

[[flags]]
var = "DEB_CXXFLAGS_APPEND"
flag = "-gdwarf-4"
reason = "Noble's dwz 0.15 doesn't support DWARF5 (Clang 18 defaults to DWARF5)"
