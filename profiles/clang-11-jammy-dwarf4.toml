# Clang 11 on Jammy with -gdwarf-4 workaround.
# Jammy's dwz 0.14 does not fully support DWARF5 output from Clang.
# This flag forces DWARF4 output, which dwz can process correctly.

[compiler]
type = "clang"
version = "11"

[target]
series = "jammy"

[[flags]]
var = "DEB_CFLAGS_APPEND"
flag = "-gdwarf-4"
reason = "Jammy's dwz 0.14 does not fully support DWARF5 output from Clang 11"

[[flags]]
var = "DEB_CXXFLAGS_APPEND"
flag = "-gdwarf-4"
reason = "Jammy's dwz 0.14 does not fully support DWARF5 output from Clang 11"
